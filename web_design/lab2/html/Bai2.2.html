<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab2 Bai2 Le Tan Danh form dang nhap</title>
    <link rel="stylesheet" href="../css/Bai2.2.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <form action="Bai2.1.html" 
                target="_blank"
                class="registration">
                <h2>Hello, Welcome!</h2>
                <p>Don't have an account</p>
                <button type="submit" class="btnreg">Registration</button>
            </form>
        </div>
        <div class="right">
            <form class="login" 
                action="https://www.w3schools.com/action_page.php"
                method="POST"
                target="_blank">
                <h2>Login</h2>
                <input class="btninput" type="text" placeholder="Username" name="username">
                <input class="btninput" type="password" placeholder="Password" name="password">
                <p class="forgot">Forgot password!</p>
                <button type="submit" class="btnlog">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
