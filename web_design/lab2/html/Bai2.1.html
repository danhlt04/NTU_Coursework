<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab2 Bai2 Le Tan Danh form dang ky</title>
    <link rel="stylesheet" href="../css/Bai2.1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="left">
            <form class="registration" 
                action="https://www.w3schools.com/action_page.php" 
                method="POST"
                target="_blank">
                <h2>Registration</h2>
                <div class="btninput">
                    <input type="text" placeholder="Username" name="username">
                    <i class="fa fa-user-o"></i>
                </div>
                <div class="btninput">
                    <input type="email" placeholder="Email" name="email">
                    <i class="fa fa-envelope"></i>
                </div>
                <div class="btninput">
                    <input type="password" placeholder="Password" name="password">
                    <i class="fa fa-lock"></i>
                </div>
                <button type="submit" class="btnreg">Registration</button>
                <p>Or login with social platforms</p>
                <div class="social">
                    <i class="fa fa-facebook-official" aria-hidden="true"></i>
                    <i class="fa fa-instagram" aria-hidden="true"></i>
                    <i class="fa fa-google" aria-hidden="true"></i>
                </div>
            </form>
        </div>
        <div class="right">
            <h2>Welcome Back!</h2>
            <p>Don't have an account</p>
            <button type="submit" class="btnlog">Login</button>
        </div>
    </div>
</body>
</html>
